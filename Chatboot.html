<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MC Pupusas - Chatbot</title>
</head>

<body>
  <!-- Barra superior de la pagina -->
  <header>
    <!-- Logo o nombre de la marca -->
    <div>
      <p>MC</p>
      <h1>PUPUSAS</h1>
    </div>

    <!-- Menu de navegacion -->
    <nav>
      <ul>
        <li><a href="#">Inicio</a></li>
        <li><a href="#">Quienes Somos?</a></li>
        <li><a href="#">Consulta Aqui</a></li>
      </ul>
    </nav>
  </header>

  <!-- Contenido principal -->
  <main>
    <!-- Columna izquierda: espacio para el chatbot -->
    <section>
      <!-- Area donde apareceran los mensajes del chat -->
      <div>
        <!-- Aqui ira el historial de mensajes del usuario y del bot -->
      </div>

      <!-- Area inferior del chat: campo de escritura y boton -->
      <form>
        <input type="text" placeholder="Escribe aqui...">
        <button type="submit">Enviar</button>
      </form>
    </section>

    <!-- Columna derecha: decoracion y promociones -->
    <aside>
      <!-- Titulo llamativo -->
      <section>
        <h2>CONSULTA AQUI!</h2>
      </section>

      <!-- Etiqueta de promociones -->
      <section>
        <h3>PROMOCIONES!</h3>
      </section>

      <!-- Espacio reservado para imagen promocional -->
      <section>
        <!-- Aqui se colocara una imagen de pupusas o promociones -->
      </section>

      <!-- Espacio reservado para personaje o arte decorativo -->
      <section>
        <!-- Aqui se colocara la mascota o personaje decorativo -->
      </section>

      <!-- Espacio reservado para otra imagen o decoracion -->
      <section>
        <!-- Aqui se colocara otra imagen decorativa -->
      </section>
    </aside>
  </main>
</body>
</html>
