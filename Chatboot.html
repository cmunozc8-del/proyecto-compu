<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MC Pupusas - Chatbot</title>
  <link rel="stylesheet" href="chatboot.css">
</head>

<body>
  <!-- Barra superior de la pagina -->
  <header class="topbar">
    <!-- Logo o nombre de la marca -->
    <div class="logo">
      <p>MC</p>
      <h1>PUPUSAS</h1>
    </div>

    <!-- Menu de navegacion -->
    <nav class="nav">
      <ul>
        <li><a href="#">Inicio</a></li>
        <li><a href="#">Quienes Somos?</a></li>
        <li><a href="#">Consulta Aqui</a></li>
      </ul>
    </nav>
  </header>

  <!-- Contenido principal -->
  <main class="page">
    <!-- Columna izquierda: espacio para el chatbot -->
    <section class="chat-card">
      <div class="chat-box">
        <!-- Aqui ira el historial de mensajes del usuario y del bot -->
      </div>

      <form class="chat-form">
        <input type="text" placeholder="Escribe aqui...">
        <button type="submit">Enviar</button>
      </form>
    </section>

    <!-- Columna derecha: decoracion y promociones -->
    <aside class="promo-column">
      <section class="title-banner">
        <h2>CONSULTA AQUI!</h2>
      </section>

      <section class="promo-label">
        <h3>PROMOCIONES!</h3>
      </section>

      <section class="image-placeholder wide-placeholder">
        <img src="mcpupusas-2.png" alt="Plato de pupusas con salsa y curtido">
      </section>

      <section class="image-row">
        <div class="image-placeholder mascot-placeholder">
          <img src="mcpupusin-v1.png" alt="Mascota de MC Pupusas">
        </div>

        <div class="image-placeholder square-placeholder">
          <img src="mcpupusas-1.png" alt="Pupusas con curtido">
        </div>
      </section>
    </aside>
  </main>
</body>
</html>
